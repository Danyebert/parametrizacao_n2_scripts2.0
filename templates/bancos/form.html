{% extends 'base.html' %}{% block content %}<h3>Banco Mapeado</h3><form method="post" class="card p-3 row g-3"><div class="col-md-6"><label>Nome</label><input class="form-control" name="nome" value="{{item.nome or ''}}" required></div><div class="col-md-3"><label>Tipo banco</label><input class="form-control" name="tipo_banco" value="{{item.tipo_banco or ''}}"></div><div class="col-12"><label>Descrição</label><textarea class="form-control" name="descricao">{{item.descricao or ''}}</textarea></div><div class="col-12"><label>Observações</label><textarea class="form-control" name="observacoes">{{item.observacoes or ''}}</textarea></div><div><button class="btn btn-primary">Salvar</button></div></form>{% endblock %}
