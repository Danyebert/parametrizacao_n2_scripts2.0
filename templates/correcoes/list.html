{% extends 'base.html' %}{% block content %}<div class="d-flex justify-content-between">
    <h3>Correções N2</h3>{% if is_admin %}<a class="btn btn-primary" href="{{url_for('correcoes_novo')}}"><i
            class="bi bi-plus"></i> Nova</a>{% endif %}
</div>
<form class="card p-3 my-3 row g-2">
    <div class="col-md-4"><input class="form-control" name="busca" placeholder="Buscar"
            value="{{request.args.get('busca','')}}"></div>
    <div class="col-md-3"><select class="form-select" name="categoria">
            <option value="">Todas categorias</option>{% for c in categorias %}<option {{'selected' if
                request.args.get('categoria')==c}}>{{c}}</option>{% endfor %}
        </select></div>
    <div class="col-md-3"><select class="form-select" name="criticidade">
            <option value="">Todas criticidades</option>{% for c in ['Baixa','Média','Alta'] %}<option {{'selected' if
                request.args.get('criticidade')==c}}>{{c}}</option>{% endfor %}
        </select></div>
    <div class="col-md-2"><button class="btn btn-secondary w-100">Filtrar</button></div>
</form>{% if is_admin %}<div class="mb-3 d-flex gap-2"><a class="btn btn-outline-success"
        href="{{url_for('correcoes_exportar')}}">Exportar JSON</a>
    <form action="{{url_for('correcoes_importar')}}" method="post" enctype="multipart/form-data" class="d-flex gap-2">
        <input class="form-control" type="file" name="arquivo" accept=".json" required><button
            class="btn btn-outline-primary">Importar JSON</button></form>
</div>{% endif %}<div class="card">
    <table class="table table-hover mb-0">
        <thead>
            <tr>
                <th>Título</th>
                <th>Sistema</th>
                <th>Categoria</th>
                <th>Criticidade</th>
                <th></th>
            </tr>
        </thead>
        <tbody>{% for i in itens %}<tr>
                <td>{{i.titulo}}</td>
                <td>{{i.sistema}}</td>
                <td>{{i.categoria}}</td>
                <td><span
                        class="badge bg-{{'danger' if i.criticidade=='Alta' else 'warning' if i.criticidade=='Média' else 'success'}}">{{i.criticidade}}</span>
                </td>
                <td><a class="btn btn-sm btn-outline-primary" href="{{url_for('correcoes_ver',id=i.id)}}">Abrir</a></td>
            </tr>{% endfor %}</tbody>
    </table>
</div>{% endblock %}
