{% extends 'base.html' %}

{% block content %}
<div class="correcao-form-page">
    <div class="correcoes-hero">
        <div class="correcoes-title-row">
            <div class="correcoes-title-icon"><i class="bi bi-tools"></i></div>
            <div>
                <h3>{{ 'Editar' if item else 'Nova' }} Correção N2</h3>
                <p>Cadastre erro, causa provável, solução aplicada e anexos de apoio.</p>
            </div>
        </div>
    </div>

    <form method="post" enctype="multipart/form-data" class="correcao-form-card">
        <div class="row g-3">
            <div class="col-lg-6">
                <label class="form-label">Título</label>
                <input class="form-control" name="titulo" value="{{ item.titulo if item else '' }}" required>
            </div>

            <div class="col-lg-3">
                <label class="form-label">Sistema</label>
                <input class="form-control" name="sistema" value="{{ item.sistema if item else '' }}">
            </div>

            <div class="col-lg-3">
                <label class="form-label">Categoria</label>
                <input class="form-control" name="categoria" value="{{ item.categoria if item else '' }}">
            </div>

            <div class="col-lg-3">
                <label class="form-label">Criticidade</label>
                <select class="form-select" name="criticidade">
                    {% for c in ['Baixa','Média','Alta'] %}
                    <option value="{{ c }}" {% if item and item.criticidade == c %}selected{% endif %}>{{ c }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-12">
                <label class="form-label">Erro apresentado</label>
                <textarea class="codemirror-sql" name="erro">{{ item.erro if item else '' }}</textarea>
            </div>

            <div class="col-12">
                <label class="form-label">Causa provável</label>
                <textarea class="form-control" name="causa" rows="4">{{ item.causa if item else '' }}</textarea>
            </div>

            <div class="col-12">
                <label class="form-label">Correção aplicada</label>
                <textarea class="codemirror-sql" name="correcao">{{ item.correcao if item else '' }}</textarea>
            </div>

            <div class="col-12">
                <label class="form-label">Anexos JPG/PNG</label>
                <input class="form-control" type="file" name="anexos" multiple accept="image/png,image/jpeg">
            </div>
        </div>

        {% if item %}
        <hr>
        <div class="row g-3">
            {% for a in item.anexos if not a.deleted_at %}
            <div class="col-md-3">
                <img class="img-fluid thumb" src="{{ url_for('anexo_ver', id=a.id) }}">
                <form method="post" action="{{ url_for('anexo_excluir', id=a.id) }}">
                    <button class="btn btn-sm btn-outline-danger mt-2">Remover</button>
                </form>
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <div class="mt-3 d-flex gap-2">
            <button class="btn btn-primary">Salvar</button>
            <a class="btn btn-secondary" href="{{ url_for('correcoes_listar') }}">Voltar</a>
        </div>
    </form>
</div>
{% endblock %}
