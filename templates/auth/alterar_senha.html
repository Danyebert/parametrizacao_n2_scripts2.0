{% extends 'base.html' %}{% block content %}<div class="card p-4">
    <h4>Alterar senha</h4>
    <form method="post" class="row g-3">
        <div class="col-md-4"><label>Senha atual</label><input class="form-control" type="password" name="senha_atual"
                required></div>
        <div class="col-md-4"><label>Nova senha</label><input class="form-control" type="password" name="nova_senha"
                required></div>
        <div class="col-md-4"><label>Confirmar senha</label><input class="form-control" type="password"
                name="confirmar_senha" required></div>
        <div><button class="btn btn-primary">Salvar</button></div>
    </form>
</div>{% endblock %}
