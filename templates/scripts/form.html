{% extends 'base.html' %}{% block content %}<h3>{{'Editar' if item else 'Novo'}} Script SQL</h3><form method="post" class="card p-3"><div class="row g-3"><div class="col-md-6"><label>Título</label><input class="form-control" name="titulo" value="{{item.titulo if item else ''}}" required></div><div class="col-md-3"><label>Tipo de banco</label><input class="form-control" name="tipo_banco" value="{{item.tipo_banco if item else ''}}" required></div><div class="col-12"><label>Descrição</label><textarea class="form-control" name="descricao">{{item.descricao if item else ''}}</textarea></div><div class="col-12"><label>Observações</label><textarea class="form-control" name="observacoes">{{item.observacoes if item else ''}}</textarea></div></div><hr><h5>Consultas vinculadas</h5><div id="consultas">{% if item and item.consultas %}{% for c in item.consultas|sort(attribute='ordem') %}<div class="consulta border rounded p-3 mb-3"><label>Título da consulta</label><input class="form-control mb-2" name="titulo_consulta[]" value="{{c.titulo_consulta}}"><label>Código SQL</label><textarea class="codemirror-sql" name="codigo_sql[]">{{c.codigo_sql}}</textarea><button type="button" class="btn btn-outline-danger mt-2" onclick="this.closest('.consulta').remove()">Remover consulta</button></div>{% endfor %}{% else %}<div class="consulta border rounded p-3 mb-3"><label>Título da consulta</label><input class="form-control mb-2" name="titulo_consulta[]"><label>Código SQL</label><textarea class="codemirror-sql" name="codigo_sql[]"></textarea><button type="button" class="btn btn-outline-danger mt-2" onclick="this.closest('.consulta').remove()">Remover consulta</button></div>{% endif %}</div><button type="button" class="btn btn-outline-secondary" onclick="addConsulta()">Adicionar Consulta</button><div class="mt-3"><button class="btn btn-primary">Salvar</button></div></form><script>function addConsulta(){document.getElementById('consultas').insertAdjacentHTML('beforeend',`<div class="consulta border rounded p-3 mb-3"><label>Título da consulta</label><input class="form-control mb-2" name="titulo_consulta[]"><label>Código SQL</label><textarea class="codemirror-sql" name="codigo_sql[]"></textarea><button type="button" class="btn btn-outline-danger mt-2" onclick="this.closest('.consulta').remove()">Remover consulta</button></div>`);initCodeMirror()}</script>{% endblock %}
